    const canvasCrop = document.createElement('canvas')

    const imgObj = {}

    const target_width = 320
    const cap = new Capture()
    const serial = new WebSerialManager()


    const gui = new lil.GUI({ title: 'Mandlauto' })
    const folderCapture = gui.addFolder('Capture')
    const folderInput = gui.addFolder('Input')

    const folderSlot = gui.addFolder('Slot')

    const folderTool = gui.addFolder('Tools').close()
    const folderPos = folderTool.addFolder('GUI Position').close()
    const folderForm = folderTool.addFolder('Download Form').close()
    const folderInfo = folderTool.addFolder('Information').close()



    const guiObj = {
        captureMode: 'None',
        fps: 5,
        viewMode: 'Capture',
        roi: 'x1, y1, x2, y2',
        inputMode: 'None',
        testCMD: '',
        loopTime: 0,
        guiToTop: () => {
            moveGUI(0, 0, target_width)
        },
        guiToBottom: () => {
            const ratio = cap.width / target_width
            moveGUI(0, (cap.height / ratio) + 5, target_width)
        },
        guiToTopRight: () => {
            moveGUI(target_width + 5, 0, target_width)
        },
        captureROI: () => {
            const roiValue = guiObj.roi.split(',').map(v => Number(v.trim()))
            const fileName = `${getTimestamp()}_capture_${roiValue.toString()}.jpg`
            cap.saveFrame(roiValue[0], roiValue[1], roiValue[2], roiValue[3], fileName)
        },
        captureFrame: () => {
            const fileName = `${getTimestamp()}_capture.jpg`
            cap.saveFrame(0, 0, cap.width, cap.height, fileName)
        },
        addImg: () => { addImg() },
        addTxt: () => { addTxt() },
        formTimer: () => {
            const text = `type: timer\nkey : \ncooltime :`
            downloadTextFile('Form_Timer', text)
        },
        formImg: () => {
            const text = `type : img\nkey : \nimg : \ncooltime : \nx1 :\ny1 :\nx2 :\ny2 : \nthreshold : 0.8\nscale : 0.5`
            downloadTextFile('Form_Image', text)
        },
        formScript: () => {
            const text = `type : script\nkey : \nslots : \ncooltime : `
            downloadTextFile('Form_Script', text)
        },
        formRequestInfo: () => {
            const text = `type : requestInfo\nurl : \ncooltime : `
            downloadTextFile('Form_RequestInfo', text)
        },
        saveData: () => {
            saveImagesToStorage()
            saveTxtToStorage()
            alert('Data saved to localStorage.')
        },
        loadData: () => {
            loadImagesFromStorage().then(() => {
                loadTxtFromStorage()
            })
        }
    }


    const captureSelect = folderCapture.add(guiObj, 'captureMode')
        .name('Capture Mode')
        .options(['Desktop', 'Streaming'])
        .onChange((value) => {
            if (value === 'Desktop') startCapture()
            else if (value === 'Streaming') startStream()
        })


    const fpsSelect = folderCapture.add(guiObj, 'fps')
        .name('FPS')
        .options([1, 2, 3, 5, 10])
        .onChange((value) => {
            console.log(value)
        })


    const resetROI = () => {
        if (cap.onStream) {
            roiInput.setValue(`0, 0, ${cap.width}, ${cap.height}`)
        } else {
            roiInput.setValue(`x1, y1, x2, y2`)
        }
    }


    const viewSelect = folderCapture.add(guiObj, 'viewMode')
        .name('View Mode')
        .options(['Capture', 'ROI'])
        .onChange((value) => {
            if (value === 'ROI') {
                roiInput.show()
                captureROIBtn.show()
                resetROI()
            }
            else {
                cap.draw.clearRect(0, 0, cap.width, cap.height)
                roiInput.hide()
                captureROIBtn.hide()
            }
        })
        .disable()


    const roiInput = folderCapture.add(guiObj, 'roi')
        .name('ROI')
        .onFinishChange((value) => {
            const roiValue = value.split(',').map(v => Number(v.trim()))
            if (roiValue.some(v => Number.isNaN(v))) {
                console.log('ROI parsing error. (NaN)')
                resetROI()
                return
            }
            if (roiValue.length != 4) {
                console.log('ROI parsing error. (Length)')
                resetROI()
                return
            }
            if (roiValue[0] >= roiValue[2] || roiValue[1] >= roiValue[3]) {
                console.log('ROI parsing error. (Value)')
                resetROI()
                return
            }
            cap.draw.clearRect(0, 0, cap.width, cap.height)
            cap.draw.strokeStyle = '#0000FF'
            cap.draw.strokeRect(roiValue[0], roiValue[1], roiValue[2] - roiValue[0], roiValue[3] - roiValue[1])
        })
        .hide()


    const captureROIBtn = folderCapture.add(guiObj, 'captureROI').name('Capture ROI Frame').hide()

    folderCapture.add(guiObj, 'captureFrame').name('Capture Frame')

    const inputSelect = folderInput.add(guiObj, 'inputMode')
        .name('Input Mode')
        .options(['Serial', 'Server'])
        .onChange(async (value) => {
            if (value === 'Serial') {
                await serial.connect()
                if (serial.isConnected) inputSelect.disable()
            } else if (value === 'Server') {
                inputURL = prompt('Input URL : ', inputURL)
                localStorage.setItem('inputURL', inputURL)
            }
        })


    const inputTest = folderInput.add(guiObj, 'testCMD')
        .name('Test Command')
        .onFinishChange(async (value) => {
            inputTest.setValue('')
            await send_keys(value)
        })


    const addImgBtn = folderSlot.add(guiObj, 'addImg').name('Add Images. (0)')
    const addTxtBtn = folderSlot.add(guiObj, 'addTxt').name('Add Slot Files. (0)')
    const sampleTimerBtn = folderForm.add(guiObj, 'formTimer').name('Timer')
    const sampleImgBtn = folderForm.add(guiObj, 'formImg').name('Image')
    const sampleScriptBtn = folderForm.add(guiObj, 'formScript').name('Script')
    const sampleRequestInfoBtn = folderForm.add(guiObj, 'formRequestInfo').name('Request Information')


    folderPos.add(guiObj, 'guiToTop').name('Top')
    folderPos.add(guiObj, 'guiToTopRight').name('Top Right')
    folderPos.add(guiObj, 'guiToBottom').name('Bottom')

    const loopTime = folderInfo.add(guiObj, 'loopTime').name('Loop Time (ms)')

    folderTool.add(guiObj, 'saveData').name('Save Data to Storage')
    folderTool.add(guiObj, 'loadData').name('Load Data from Storage')


    const wait = msec => {
        return new Promise(resolve => {
            setTimeout(resolve, msec)
        })
    }


    const writeKey = (key) => {
        if (guiObj.inputMode === 'Serial' && serial.isConnected) {
            serial.send(key)
            console.log(`Serial send : ${key}`)
        } else if (guiObj.inputMode === 'Server') {
            if (key.includes(',')) {
                const [x, y] = key.split(',').map(Number)
                fetch(`${inputURL}?cmd=click&x=${x}&y=${y}`)
            } else {
                fetch(`${inputURL}?cmd=write&key=${key}`)
            }
            // const url = `${inputURL.endsWith('/') || inputURL.endsWith('=') ? inputURL : inputURL + '/'}${key}`
            // fetch(url)
            console.log(`Server send : ${key}`)
        } else {
            console.log(`Not connected. ${key}`)
        }
    }


    const send_keys = async (keys, type = 'none', name = 'none') => {
        for (const key of keys.split(' ')) {
            if (key.indexOf('-') === 0) {
                const argument = Number(key.slice(1))
                await wait(argument * 1000)
            } else if (key.indexOf('@') === 0) {
                //Magic key
                const argument = key.slice(1)
                if (argument.includes('click@') && type === 'img' && name != 'none') {
                    const idx = argument.indexOf('@')
                    const argu = Number(argument.slice(idx + 1))
                    const result = slots[name].result
                    const magicKey = `${Math.round(result.cx * argu)},${Math.round(result.cy * argu)}`
                    writeKey(magicKey)
                } else {
                    if (argument === 'capture') {
                        const fileName = `${getTimestamp()}_capture.jpg`
                        cap.saveFrame(0, 0, cap.width, cap.height, fileName)
                    } else if (argument === 'click' && type === 'img' && name != 'none') {
                        const result = slots[name].result
                        const magicKey = `${result.cx},${result.cy}`
                        writeKey(magicKey)
                    }
                }
            } else {
                writeKey(key)
            }
        }
    }


    const moveGUI = (x, y, width) => {
        gui.domElement.style.position = 'fixed'
        gui.domElement.style.width = `${width}px`
        gui.domElement.style.top = `${y}px`
        gui.domElement.style.left = `${x}px`
        gui.domElement.style.right = 'auto'
    }


    const adjustCap = () => {
        const ratio = cap.width / target_width
        cap.apply()
        cap.setSize(cap.width / ratio, cap.height / ratio)
        cap.setPosition(0, 0)
        moveGUI(0, (cap.height / ratio) + 5, target_width)
        captureSelect.disable()
        viewSelect.enable()
        roiInput.setValue(`0, 0, ${cap.width}, ${cap.height}`)
    }


    const startCapture = () => {
        cap.fromCapture().then(() => {
            adjustCap()
        })
    }


    const startStream = () => {
        const url = prompt('Stream URL : ', streamURL)
        cap.fromURL(url).then(() => {
            adjustCap()
            localStorage.setItem('streamURL', url)
        })
    }


    const cvLoaded = () => {
        cv.onRuntimeInitialized = () => {
            console.log('opencv.js loaded.')
            console.log('Start Loop.')
            loop()
        }
    }


    function addImg() {
        const input = document.createElement('input')
        input.type = 'file'
        input.accept = 'image/*'
        input.multiple = true

        input.onchange = async e => {
            const files = Array.from(e.target.files)
            const tasks = files.map(file => {
                return new Promise(resolve => {
                    const name = file.name
                    const key = name.split('.')[0]
                    const url = URL.createObjectURL(file)
                    imgObj[key] = url
                    const img = new Image()
                    img.onload = () => {
                        const src = cv.imread(img)
                        const gray = new cv.Mat()
                        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY)
                        imgMatObj[key] = gray.clone()
                        src.delete()
                        gray.delete()
                        resolve()
                    }
                    img.src = url
                })
            })
            await Promise.all(tasks)
            addImgBtn.name(`Add Images. (${Object.keys(imgObj).length})`)
        }
        input.click()
    }


    function urlToBase64(url) {
        return new Promise(resolve => {
            const img = new Image()

            img.onload = () => {
                const canvas = document.createElement('canvas')
                canvas.width = img.width
                canvas.height = img.height

                const ctx = canvas.getContext('2d')
                ctx.drawImage(img, 0, 0)

                resolve(canvas.toDataURL('image/png'))
            }

            img.src = url
        })
    }


    async function saveImagesToStorage() {
        const data = {}

        for (const [key, url] of Object.entries(imgObj)) {
            data[key] = await urlToBase64(url)
        }

        localStorage.setItem('images', JSON.stringify(data))
    }


    async function loadImagesFromStorage() {
        const json = localStorage.getItem('images')

        if (!json) return

        const data = JSON.parse(json)

        const tasks = Object.entries(data).map(([key, base64]) => {
            return new Promise(resolve => {
                imgObj[key] = base64

                const img = new Image()

                img.onload = () => {
                    const src = cv.imread(img)

                    const gray = new cv.Mat()
                    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY)

                    if (imgMatObj[key]) {
                        imgMatObj[key].delete()
                    }

                    imgMatObj[key] = gray.clone()

                    src.delete()
                    gray.delete()

                    resolve()
                }

                img.src = base64
            })
        })

        await Promise.all(tasks)

        addImgBtn.name(`Add Images. (${Object.keys(imgObj).length})`)
    }

    async function saveTxtToStorage() {

        const saveData = {}

        Object.keys(slotTexts).forEach(key => {
            saveData[key] = slotTexts[key]
        })

        localStorage.setItem(
            'slotFiles',
            JSON.stringify(saveData)
        )
    }

    function parseSlotText(name, text) {

        // For GUI checkbox.
        guiObj[name] = false

        const lines = text.split('\n')

        const data = {}

        data.cooling = false
        data.run = false

        lines.forEach(line => {

            console.log(line)

            let [key, value] = line
                .split(':')
                .map(v => v.trim())

            if (key == 'url') {
                const idx = line.indexOf(':')
                value = line.slice(idx + 1).trim()
            }

            if (key === 'img') {

                const imgs = value
                    .split(' ')
                    .map(v => v.trim().toLowerCase())

                data.img = []

                data.img.push(...imgs)

                data.mats = data.img.map(
                    v => imgMatObj[v.split('.')[0]]
                )

                data.scale =
                    typeof (data.scale) == 'undefined'
                        ? 0.5
                        : Number(data.scale)

                data.result = {
                    value: 0,
                    cx: 0,
                    cy: 0,
                    bool: false
                }

            } else {

                data[key] = value
            }
        })

        slots[name] = data
    }

    function validateSlots() {

        for (const key of Object.keys(slots)) {

            if (slots[key].type === undefined) {

                console.log('Type not defined.')

                delete slots[key]

                return false

            } else {

                if (slots[key].type === 'timer') {

                    const checker = ['key', 'cooltime']

                    for (const check of checker) {

                        if (slots[key].hasOwnProperty(check) === false) {

                            console.error(`There is no ${check} at ${key}`)

                            delete slots[key]

                            return false
                        }

                        if (
                            slots[key][check] === undefined
                            || slots[key][check] === ''
                        ) {

                            console.error(`There is no value of ${key}-${check}`)

                            delete slots[key]

                            return false
                        }
                    }
                }

                if (slots[key].type === 'img') {

                    const checker = [
                        'key',
                        'img',
                        'cooltime',
                        'x1',
                        'x2',
                        'y1',
                        'y2',
                        'threshold'
                    ]

                    for (const check of checker) {

                        if (slots[key].hasOwnProperty(check) === false) {

                            console.error(`There is no ${check} at ${key}`)

                            delete slots[key]

                            return false
                        }

                        if (
                            slots[key][check] === undefined
                            || slots[key][check] === ''
                        ) {

                            console.error(`There is no value of ${key}-${check}`)

                            delete slots[key]

                            return false
                        }
                    }

                    for (const i of slots[key].img) {

                        if (imgMatObj[i.split('.')[0]] === undefined) {

                            console.error(`ImageSlot ${key} Mat Error.`)

                            delete slots[key]

                            return false
                        }
                    }
                }

                if (slots[key].type === 'script') {

                    const checker = [
                        'key',
                        'slots',
                        'cooltime'
                    ]

                    for (const check of checker) {

                        if (slots[key].hasOwnProperty(check) === false) {

                            console.error(`There is no ${check} at ${key}`)

                            delete slots[key]

                            return false
                        }

                        if (
                            slots[key][check] === undefined
                            || slots[key][check] === ''
                        ) {

                            console.error(`There is no value of ${key}-${check}`)

                            delete slots[key]

                            return false
                        }

                        for (
                            const s of slots[key]
                                .slots
                                .split(' ')
                                .filter(Boolean)
                        ) {

                            if (
                                slots[s.replace('!', '')]
                                === undefined
                            ) {

                                console.error(`Script ${key} slots Error.`)

                                delete slots[key]

                                return false
                            }
                        }
                    }

                    slots[key].result = false
                }

                if (slots[key].type === 'requestInfo') {

                    const checker = ['url', 'cooltime']

                    for (const check of checker) {

                        if (slots[key].hasOwnProperty(check) === false) {

                            console.error(`There is no ${check} at ${key}`)

                            delete slots[key]

                            return false
                        }

                        if (
                            slots[key][check] === undefined
                            || slots[key][check] === ''
                        ) {

                            console.error(`There is no value of ${key}-${check}`)

                            delete slots[key]

                            return false
                        }
                    }
                }
            }
        }

        return true
    }

    function refreshSlotGUI() {

        addTxtBtn.name(
            `Add Slot Files. (${Object.keys(slots).length})`
        )

        Object.keys(slots).forEach(key => {

            if (
                folderSlot.controllers.find(
                    c => c.property === key
                ) === undefined
            ) {

                folderSlot
                    .add(guiObj, key)
                    .name(`🔘 ${key}`)
                    .onChange(value => {
                        slots[key].run = value
                    })

                const opt = ['Capture', 'ROI']

                Object.keys(slots).forEach(key => {

                    if (slots[key]['type'] == 'img') {
                        opt.push(key)
                    }
                })

                viewSelect.options(opt)
            }
        })
    }

    async function loadTxtFromStorage() {

        const json = localStorage.getItem('slotFiles')

        if (!json) return

        const data = JSON.parse(json)

        Object.entries(data).forEach(([name, text]) => {

            slotTexts[name] = text

            parseSlotText(name, text)
        })

        if (validateSlots() === false) {
            return
        }

        refreshSlotGUI()
    }

    function addTxt() {

        const input = document.createElement('input')

        input.type = 'file'

        input.accept = '.txt'

        input.multiple = true

        input.onchange = async e => {

            const files = Array.from(e.target.files)

            const tasks = files.map(file => {

                return new Promise(resolve => {

                    const reader = new FileReader()

                    reader.onload = event => {

                        const name = file.name.replace('.txt', '')

                        const text = event.target.result

                        slotTexts[name] = text

                        parseSlotText(name, text)

                        resolve()
                    }

                    reader.readAsText(file)
                })
            })

            await Promise.all(tasks)

            if (validateSlots() === false) {
                return
            }

            await saveTxtToStorage()

            refreshSlotGUI()
        }

        input.click()
    }

    const getTimestamp = () => {
        let now = new Date()
        let YY = String(now.getFullYear()).slice(-2)
        let MM = String(now.getMonth() + 1).padStart(2, '0')
        let DD = String(now.getDate()).padStart(2, '0')
        let HH = String(now.getHours()).padStart(2, '0')
        let mm = String(now.getMinutes()).padStart(2, '0')
        let SS = String(now.getSeconds()).padStart(2, '0')
        return `${YY}${MM}${DD}${HH}${mm}${SS}`
    }


    const downloadTextFile = (filename, content) => {
        const blob = new Blob([content], {
            type: 'text/plain;charset=utf-8'
        })

        const url = URL.createObjectURL(blob)

        const a = document.createElement('a')
        a.href = url
        a.download = filename

        document.body.appendChild(a)
        a.click()

        document.body.removeChild(a)
        URL.revokeObjectURL(url)
    }


    const matchTemplate = (background, targets, scale = 1.0) => {
        if (!background || !targets || targets.length === 0) return null

        const startTime = performance.now()

        let src = cv.imread(background)
        let gray = new cv.Mat()
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY)

        const originalCols = gray.cols
        const originalRows = gray.rows

        if (scale !== 1.0) {
            const dsize = new cv.Size(
                Math.floor(originalCols * scale),
                Math.floor(originalRows * scale)
            )
            let resized = new cv.Mat()
            cv.resize(gray, resized, dsize, 0, 0, cv.INTER_AREA)
            gray.delete()
            gray = resized
        }

        // 🔥 평탄화 변수
        let score = -1
        let x = null
        let y = null
        let w = 0
        let h = 0
        let targetIndex = -1

        targets.forEach((target, idx) => {
            if (!target) return
            let tpl = target
            if (scale !== 1.0) {
                const dsize = new cv.Size(
                    Math.floor(target.cols * scale),
                    Math.floor(target.rows * scale)
                )
                let resizedTpl = new cv.Mat()
                cv.resize(target, resizedTpl, dsize, 0, 0, cv.INTER_AREA)
                tpl = resizedTpl
            }
            if (gray.cols < tpl.cols || gray.rows < tpl.rows) {
                if (tpl !== target) tpl.delete()
                return
            }
            const result = new cv.Mat()
            cv.matchTemplate(gray, tpl, result, cv.TM_CCOEFF_NORMED)
            const minMax = cv.minMaxLoc(result)
            if (minMax.maxVal > score) {
                score = minMax.maxVal
                x = Math.floor(minMax.maxLoc.x / scale)
                y = Math.floor(minMax.maxLoc.y / scale)
                w = target.cols
                h = target.rows
                targetIndex = idx
            }
            result.delete()
            if (tpl !== target) tpl.delete()
        })
        const endTime = performance.now()
        src.delete()
        gray.delete()

        let cx = null
        let cy = null

        if (x !== null && y !== null) {
            cx = x + Math.floor(w / 2)
            cy = y + Math.floor(h / 2)
        }
        return { score, x, y, w, h, cx, cy, targetIndex, time: endTime - startTime }
    }


    const loop = async () => {
        const start = performance.now()

        // Timer
        for (const name of Object.keys(slots)) {
            if (slots[name]['type'] == 'timer') {
                if (slots[name]['run'] && !slots[name]['cooling']) {
                    slots[name]['cooling'] = true
                    const cooltime = Number(slots[name].cooltime)
                    const key = slots[name].key
                    setTimeout(() => { slots[name]['cooling'] = false }, cooltime * 1000)
                    await send_keys(key)
                }
            }
        }

        // Image Matching
        if (cap.onStream) {
            const canvas = cap.getCanvas()
            for (const name of Object.keys(slots)) {
                if (slots[name]['type'] == 'img') {
                    const cooltime = Number(slots[name].cooltime)
                    // const cooling = slots[name].cooling
                    const threshold = Number(slots[name].threshold)
                    const x1 = Number(slots[name].x1)
                    const x2 = Number(slots[name].x2)
                    const y1 = Number(slots[name].y1)
                    const y2 = Number(slots[name].y2)
                    const key = slots[name].key
                    const scale = slots[name].scale
                    const mats = slots[name].mats

                    const w = x2 - x1
                    const h = y2 - y1
                    canvasCrop.width = w
                    canvasCrop.height = h
                    ctxCrop.drawImage(canvas, x1, y1, w, h, 0, 0, w, h)

                    const match = matchTemplate(canvasCrop, mats, scale)
                    slots[name].result.value = match.score
                    slots[name].result.bool = match.score >= threshold
                    slots[name].result.cx = match.cx + x1
                    slots[name].result.cy = match.cy + y1


                    if (slots[name]['run'] && !slots[name]['cooling'] && slots[name]['result']['bool']) {
                        slots[name]['cooling'] = true
                        setTimeout(() => { slots[name]['cooling'] = false }, cooltime * 1000)
                        await send_keys(key, 'img', name)
                    }

                    // ROI and Result draw
                    if (viewSelect.getValue() === name) {
                        cap.draw.clearRect(0, 0, cap.width, cap.height)
                        cap.draw.strokeStyle = '#0000FF'
                        cap.draw.strokeRect(x1, y1, w, h)
                        cap.draw.strokeStyle = slots[name].result.bool ? '#00FF00' : '#FFFF00'
                        cap.draw.strokeRect(x1 + match.x, y1 + match.y, match.w, match.h)
                    }
                    let resultIcon = slots[name].result.bool ? '🟢' : '🟡'
                    folderSlot.controllers.find(c => c.property === name).name(`${resultIcon} ${name} [${match.score.toFixed(2)} | ${slots[name]['result'].cx}, ${slots[name]['result'].cy}]`)
                }
            }
        }

        // Script
        for (const name of Object.keys(slots)) {
            if (slots[name]['type'] == 'script') {
                let result = []
                for (const slot of slots[name].slots.split(' ').filter(Boolean)) {
                    if (slot.startsWith('!')) {
                        if (slots[slot.replace('!', '')].result.bool === false) {
                            result.push(true)
                        } else {
                            result.push(false)
                        }
                    } else {
                        if (slots[slot].result.bool === false) {
                            result.push(false)
                        } else {
                            result.push(true)
                        }
                    }
                }
                slots[name].result = result.every(v => v === true) ? true : false
                let resultIcon = slots[name].result ? '🟢' : '🟡'
                folderSlot.controllers.find(c => c.property === name).name(`${resultIcon} ${name} `)

                if (slots[name]['run'] && !slots[name]['cooling'] && slots[name]['result']) {
                    slots[name]['cooling'] = true
                    const cooltime = Number(slots[name].cooltime)
                    const key = slots[name].key
                    setTimeout(() => { slots[name]['cooling'] = false }, cooltime * 1000)
                    await send_keys(key, 'script', name)
                }
            }
        }

        // Request Information
        for (const name of Object.keys(slots)) {
            if (slots[name]['type'] == 'requestInfo') {
                if (slots[name]['run'] && !slots[name]['cooling']) {
                    slots[name]['cooling'] = true
                    const cooltime = Number(slots[name].cooltime)
                    const url = slots[name].url
                    fetch(url).then(response => response.text()).then(data => {
                        folderSlot.controllers.find(c => c.property === name).name(`🔘 ${name} [${data}]`)
                    })
                    setTimeout(() => { slots[name]['cooling'] = false }, cooltime * 1000)
                }
            }
        }

        const end = performance.now()
        const elapsed = end - start
        const delay = Math.max(0, (1000 / guiObj.fps) - elapsed)

        loopTime.setValue(Math.round(elapsed))
        setTimeout(loop, delay)
    }


    window.onload = () => {
        console.log('Window.onload.')
        inputURL = localStorage.getItem('inputURL') || ''
        streamURL = localStorage.getItem('streamURL') || ''
        console.log('Loaded URLs:', { inputURL, streamURL })
        moveGUI(0, 0, target_width)
    }


</script>
