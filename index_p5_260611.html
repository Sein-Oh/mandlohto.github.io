<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8' />
    <title>만들오토 v1.7 (2026.06.11)</title>
    <script src='https://cdn.jsdelivr.net/npm/p5@1.6.0/lib/p5.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/jsframe.js/lib/jsframe.min.js"></script>
    <script async src="opencv.js" onload="cvLoaded()" type="text/javascript"></script>
    <script src='webserial.js'></script>
    <style>
        select {
            text-align: center;
        }

        input {
            box-sizing: border-box;
        }

        button {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #7066E0;
            border-radius: 5px;
            border: none;
            color: white;
            font-weight: 500;
            z-index: -1;
        }

        button:hover {
            background-color: rgb(100.1092391304, 89.2777173913, 221.4222826087);
        }

        button:disabled {
            background-color: gray
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .container button {
            width: 80%;
            height: 30px;
            z-index: 999;
        }
    </style>
</head>

<body>
</body>
<script>
    let cnv, cap, capForSave
    let inputURL, streamURL
    let selCapture, selInput, selView, selFPS
    let btnCapture, btnInput, btnSlot, btnOption
    let viewMode = 'preview'
    let inputMode = undefined
    let ROI = []
    let ratio = 1

    const jsFrame = new JSFrame()

    function toast(msg) {
        jsFrame.showToast({ html: msg, align: 'center' })
    }


    function modal(title, msg, buttons) {
        return new Promise(resolve => {
            const entries = Object.entries(buttons)
            const width = 300
            const height = (40 * entries.length) + 55
            let htmlStr = '<div class="container">'
            htmlStr += `<div style="font-size:14px;margin-top:5px;">${msg}</div>`
            for (const [key, label] of entries) {
                htmlStr += `<button id="${key}">${label}</button>`
            }
            htmlStr += '</div>'
            const frame = jsFrame.create({
                title,
                left: (window.innerWidth - width) / 2,
                top: (window.innerHeight - height) / 2,
                width,
                height,
                html: htmlStr
            })
            console.log(frame.$frame)
            for (const [key] of entries) {
                frame.on(`#${key}`, 'click', (_frame) => {
                    _frame.closeFrame()
                    resolve(key)
                })
            }
            frame.on('closeButton', 'click', () => resolve(false))
            frame.showModal()
        })
    }


    const serial = new WebSerialManager()
    serial.onReceive = (msg) => {
        if (msg.trim() === 'OK') {
            toast('하드웨어 시리얼 통신에 성공했습니다.')
            inputMode = 'serial'
            // btnInput.elt.disabled = true
        }
    }

    const slots = {}
    const slotTexts = {}
    const imgObj = {}
    const imgMatObj = {}

    const cnvWidth = 320

    function getTimestamp() {
        let now = new Date()
        let YY = String(now.getFullYear()).slice(-2)
        let MM = String(now.getMonth() + 1).padStart(2, '0')
        let DD = String(now.getDate()).padStart(2, '0')
        let HH = String(now.getHours()).padStart(2, '0')
        let mm = String(now.getMinutes()).padStart(2, '0')
        let SS = String(now.getSeconds()).padStart(2, '0')
        return `${YY}${MM}${DD}${HH}${mm}${SS}`
    }


    function setup() {
        frameRate(10)
        pixelDensity(1)
        cnv = createCanvas(cnvWidth, 180)
        cnv.position(5, 5)
        cnv.style('z-index', '-1')
        capForSave = createGraphics(cnvWidth, 180)
        background(0)

        btnCapture = createButton('캡처시작')
        btnCapture.size(78, 25)
        btnCapture.elt.disabled = true
        btnCapture.mousePressed(selectCapture)

        btnInput = createButton('입력선택')
        btnInput.size(78, 25)
        btnInput.mousePressed(selectInput)

        btnSlot = createButton('슬롯')
        btnSlot.size(78, 25)
        btnSlot.elt.disabled = true
        btnSlot.mousePressed(selectSlot)

        btnOption = createButton('옵션')
        btnOption.size(77, 25)
        btnOption.mousePressed(selectOption)

        setBtnPosition()
    }


    function draw() {
        if (cap) image(cap, 0, 0, width, height)
        else background(0)

        // FPS 표시
        textSize(16)
        noStroke()
        fill(20, 255, 20)
        text(`FPS: ${frameRate().toFixed(0)}`, 10, 20)

        if (cap && viewMode === 'roi') {
            const [x1, y1, x2, y2] = ROI.map(v => Math.round(v / ratio))
            noFill()
            strokeWeight(2)
            stroke(20, 20, 255)
            rect(x1, y1, x2 - x1, y2 - y1)
        }
    }


    function cvLoaded() {
        cv.onRuntimeInitialized = () => {
            console.log('opencv.js loaded.')
            btnCapture.elt.disabled = false
            btnSlot.elt.disabled = false
        }
    }


    async function selectInput() {
        const value = await modal("입력방식 선택", "입력방식을 선택하세요.", { serial: "하드웨어 시리얼 통신", server: "서버와 통신" })
        if (value === 'serial') {
            serial.connect().then(() => serial.send("check"))
        } else if (value === "server") {
            const url = prompt("서버의 URL을 입력하세요", inputURL)
            if (url === undefined) {
                toast("입력을 취소했습니다.")
                return
            }
            toast(`입력서버 URL을 ${url}로 적용했습니다.`)
            inputURL = value
            // btnInput.elt.disabled = true
            localStorage.setItem('inputURL', inputURL)
            inputMode = 'server'
        }
    }

    function inputTest() {
        if (inputMode === undefined) {
            toast("입력방식을 선택 후 사용 가능합니다.")
            return
        }
        const cmd = prompt("명령어를 입력하세요.")
        if (cmd === undefined) {
            toast("명령어를 입력하지 않았습니다.")
            return
        }
        console.log(cmd)
    }


    async function selectCapture() {
        const value = await modal("캡처", "캡처방식을 선택하세요", {
            capture: "데스크탑 화면",
            stream: "이미지 스트리밍",
            user: "카메라(전면)",
            environment: "카메라(후면)"
        })
        if (value === 'capture') startCapture()
        else if (value === 'user') startCamera('user')
        else if (value === 'environment') startCamera('environment')
        else if (value === 'stream') {
            const url = prompt("스트리밍 서버 URL을 입력하세요.", streamURL)
            if (url === null) {
                toast("입력을 취소했습니다.")
                return
            }
            toast(`${url} 주소로 스트리밍을 시작합니다.`)
            startStream(url)
        }
    }


    async function selectOption() {
        const value = await modal("기능 선택", "실행할 기능을 선택하세요.", {
            capture: "캡처 저장",
            fps: "FPS 변경",
            roi: "ROI 보기",
            slot: "슬롯 보기",
            input: "입력 테스트"
        })
        if (value === 'capture') saveCap()
        else if (value === 'fps') selectFPS()
        else if (value === 'roi') selectROI()
        else if (value === 'input') inputTest()
    }


    function selectROI() {
        const v = prompt(`ROI 영역을 입력하세요.\n현재 캡처: ${cap.width}x${cap.height}`, ROI.join(', '))
        const n = v.trim().split(/\s*,\s*/).map(Number)
        if (n.length !== 4 || !n.every(Number.isFinite) || n[0] >= n[2] || n[1] >= n[3]) {
            toast('잘못된 ROI 입력입니다.')
            return
        }
        ROI = n
        viewMode = 'roi'
        console.log('ROI:', ROI)
    }


    function selectFPS() {
        const value = prompt("적용할 FPS를 입력하세요. (1~60 사이)")
        const num = Number(value)
        if (!value || !Number.isInteger(num)) {
            toast("숫자만 입력하세요.")
            return
        }
        if (num < 1 || num > 60) {
            toast("1~60 사이의 값을 입력하세요")
            return
        }
        frameRate(num)
    }


    async function selectSlot() {
        const value = await modal("기능 선택", "사용할 기능을 선택하세요.", {
            add: '파일 추가하기',
            save: '저장하기',
            load: '불러오기'
        })
        if (value === 'add') {
            addFiles()
        } else if (value === 'save') {
            saveImgToStorage()
                .then(() => saveTxtToStorage())
                .then(() => report('save'))
        } else if (value === 'load') {
            loadImgFromStorage()
                .then(() => loadTxtFromStorage())
                .then(() => report('load'))
        }
    }


    function startStream(url) {
        cap = createImg('', '')
        cap.elt.crossOrigin = 'anonymous'
        cap.elt.onload = () => {
            localStorage.setItem('stream_url', url)
            onCapReady()
        }
        cap.elt.onerror = err => {
            toast('스트림 연결에 실패했습니다.')
            cap = undefined
        }
        cap.elt.src = url
    }


    async function urlToBase64(url) {
        const blob = await fetch(url).then(r => r.blob())
        return await new Promise(resolve => {
            const reader = new FileReader()
            reader.onloadend = () => {
                resolve(reader.result)
            }
            reader.readAsDataURL(blob)
        })
    }


    async function saveImgToStorage() {
        const data = {}
        for (const [key, url] of Object.entries(imgObj)) {
            data[key] = await urlToBase64(url)
        }
        localStorage.setItem('images', JSON.stringify(data))
    }


    async function loadImgFromStorage() {
        const json = localStorage.getItem('images')
        if (!json) return
        const data = JSON.parse(json)
        const tasks = Object.entries(data).map(([key, base64]) => {
            return new Promise(resolve => {
                imgObj[key] = base64
                const img = new Image()
                img.onload = () => {
                    const src = cv.imread(img)
                    const gray = new cv.Mat()
                    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY)
                    if (imgMatObj[key]) {
                        imgMatObj[key].delete()
                    }
                    imgMatObj[key] = gray.clone()
                    src.delete()
                    gray.delete()
                    resolve()
                }
                img.src = base64
            })
        })
        await Promise.all(tasks)
    }


    async function loadTxtFromStorage() {
        const json = localStorage.getItem('slotFiles')
        if (!json) return
        const data = JSON.parse(json)
        Object.entries(data).forEach(([name, text]) => {
            slotTexts[name] = text
            parseSlotText(name, text)
        })
        if (validateSlots() === false) {
            return
        }
    }


    const loadImg = file => new Promise(resolve => {
        const key = file.name.split('.')[0]
        const url = URL.createObjectURL(file)
        imgObj[key] = url
        const img = new Image()
        img.onload = () => {
            const src = cv.imread(img), gray = new cv.Mat()
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY)
            imgMatObj[key]?.delete()
            imgMatObj[key] = gray.clone()
            src.delete()
            gray.delete()
            resolve()
        }
        img.src = url
    })

    const loadTxt = file => new Promise(resolve => {
        const reader = new FileReader()
        reader.onload = e => {
            const name = file.name.replace(/\.txt$/i, '')
            const text = e.target.result
            slotTexts[name] = text
            parseSlotText(name, text)
            resolve()
        }
        reader.readAsText(file)
    })


    function report(type) {
        const lenImg = Object.keys(imgObj).length
        const lenTxt = Object.keys(slots).length
        if (type === 'load') {
            if (lenImg && lenTxt) toast(`이미지 ${lenImg}개, 텍스트 ${lenTxt}개 로드 완료.`)
            else if (lenImg) toast(`이미지 ${lenImg}개 로드 완료.`)
            else if (lenTxt) toast(`텍스트 ${lenTxt}개 로드 완료.`)
        } else if (type === 'save') {
            if (lenImg && lenTxt) toast(`이미지 ${lenImg}개, 텍스트 ${lenTxt}개 저장 완료.`)
            else if (lenImg) toast(`이미지 ${lenImg}개 저장 완료.`)
            else if (lenTxt) toast(`텍스트 ${lenTxt}개 저장 완료.`)
        }
    }


    async function addFiles() {
        const input = document.createElement('input')
        input.type = 'file'
        input.accept = 'image/*,.txt'
        input.multiple = true

        input.onchange = async e => {
            const files = Array.from(e.target.files)
            const imgFiles = files.filter(f => f.type.startsWith('image/'))
            const txtFiles = files.filter(f => f.name.toLowerCase().endsWith('.txt'))

            await Promise.all(imgFiles.map(loadImg))
            await Promise.all(txtFiles.map(loadTxt))

            if (txtFiles.length) {
                if (!validateSlots()) return
                await saveTxtToStorage()
            }
            report('load')
        }
        input.click()
    }

    function parseSlotText(name, text) {
        const lines = text.split('\n')
        const data = {}
        data.cooling = false
        data.run = false
        lines.forEach(line => {
            let [key, value] = line.split(':').map(v => v.trim())
            if (key == 'url') {
                const idx = line.indexOf(':')
                value = line.slice(idx + 1).trim()
            }
            if (key === 'img') {
                const imgs = value.split(' ').map(v => v.trim().toLowerCase())
                data.img = []
                data.img.push(...imgs)
                data.mats = data.img.map(v => imgMatObj[v.split('.')[0]])
                data.scale = typeof (data.scale) == 'undefined' ? 0.5 : Number(data.scale)
                data.result = { value: 0, cx: 0, cy: 0, bool: false }
            } else {
                data[key] = value
            }
        })
        slots[name] = data
    }


    function validateSlots() {
        for (const key of Object.keys(slots)) {
            if (slots[key].type === undefined) {
                console.log('Type not defined.')
                delete slots[key]
                return false
            } else {
                if (slots[key].type === 'timer') {
                    const checker = ['key', 'cooltime']
                    for (const check of checker) {
                        if (slots[key].hasOwnProperty(check) === false) {
                            console.error(`There is no ${check} at ${key}`)
                            delete slots[key]
                            return false
                        }
                        if (slots[key][check] === undefined || slots[key][check] === '') {
                            console.error(`There is no value of ${key}-${check}`)
                            delete slots[key]
                            return false
                        }
                    }
                }
                if (slots[key].type === 'img') {
                    const checker = ['key', 'img', 'cooltime', 'x1', 'x2', 'y1', 'y2', 'threshold']
                    for (const check of checker) {
                        if (slots[key].hasOwnProperty(check) === false) {
                            console.error(`There is no ${check} at ${key}`)
                            delete slots[key]
                            return false
                        }
                        if (slots[key][check] === undefined || slots[key][check] === '') {
                            console.error(`There is no value of ${key}-${check}`)
                            delete slots[key]
                            return false
                        }
                    }
                    for (const i of slots[key].img) {
                        if (imgMatObj[i.split('.')[0]] === undefined) {
                            console.error(`ImageSlot ${key} Mat Error.`)
                            delete slots[key]
                            return false
                        }
                    }
                }
                if (slots[key].type === 'script') {
                    const checker = ['key', 'slots', 'cooltime']
                    for (const check of checker) {
                        if (slots[key].hasOwnProperty(check) === false) {
                            console.error(`There is no ${check} at ${key}`)
                            delete slots[key]
                            return false
                        }
                        if (slots[key][check] === undefined || slots[key][check] === '') {
                            console.error(`There is no value of ${key}-${check}`)
                            delete slots[key]
                            return false
                        }
                        for (const s of slots[key].slots.split(' ').filter(Boolean)) {
                            if (slots[s.replace('!', '')] === undefined) {
                                console.error(`Script ${key} slots Error.`)
                                delete slots[key]
                                return false
                            }
                        }
                    }
                    slots[key].result = false
                }
                if (slots[key].type === 'requestInfo') {
                    const checker = ['url', 'cooltime']
                    for (const check of checker) {
                        if (slots[key].hasOwnProperty(check) === false) {
                            console.error(`There is no ${check} at ${key}`)
                            delete slots[key]
                            return false
                        }
                        if (slots[key][check] === undefined || slots[key][check] === '') {
                            console.error(`There is no value of ${key}-${check}`)
                            delete slots[key]
                            return false
                        }
                    }
                }
            }
        }
        return true
    }


    async function saveTxtToStorage() {
        const saveData = {}
        Object.keys(slotTexts).forEach(key => {
            saveData[key] = slotTexts[key]
        })
        localStorage.setItem('slotFiles', JSON.stringify(saveData))
    }


    function startCamera(facingMode = 'environment') {
        const constraints = { audio: false, video: { exact: facingMode } }
        cap = createCapture(constraints, () => onCapReady())
    }


    function startCapture() {
        navigator.mediaDevices.getDisplayMedia({ video: { displaySurface: 'monitor' }, preferCurrentTab: false }).then(stream => {
            cap = createVideo()
            cap.elt.srcObject = stream
            cap.elt.play()
            cap.elt.onloadedmetadata = () => onCapReady()
        })
    }


    function setBtnPosition() {
        btnCapture.position(5, cnv.height + 8)
        btnInput.position(86, cnv.height + 8)
        btnSlot.position(167, cnv.height + 8)
        btnOption.position(248, cnv.height + 8)
    }


    function onCapReady() {
        console.log(cap.width, cap.height)
        ratio = Number(cap.width / cnvWidth)
        cnv.resize(cnvWidth, Number(cap.height / ratio))
        ROI = [0, 0, cap.width, cap.height]
        cap.hide()
        setBtnPosition()
        btnCapture.elt.disabled = true
    }


    function saveCap() {
        if (!cap) return toast('캡처된 영상이 없습니다.')
        const [x1, y1, x2, y2] = ROI
        const roi = viewMode === 'roi'
        const w = roi ? x2 - x1 : cap.width
        const h = roi ? y2 - y1 : cap.height
        capForSave.resizeCanvas(w, h)
        roi ? capForSave.image(cap, 0, 0, w, h, x1, y1, w, h) : capForSave.image(cap, 0, 0)
        saveCanvas(capForSave, `capture_${getTimestamp()}.jpg`)
    }


    window.onload = () => {
        console.log('Window.onload.')
        inputURL = localStorage.getItem('input_url') || ''
        streamURL = localStorage.getItem('stream_url') || ''
        console.log('Loaded URLs:', { inputURL, streamURL })
    }

</script>

</html>
